name: Cross Platform Smoke

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate CLI syntax
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path("payload/cursor_zh/cli.py").read_text(encoding="utf-8")
          compile(source, "payload/cursor_zh/cli.py", "exec")
          print("cli.py syntax ok")
          PY

      - name: Export local bundle
        shell: bash
        run: |
          export PYTHONPATH=payload
          rm -rf .ci-bundle
          python -m cursor_zh export-local-bundle \
            --manifest payload/patch_manifest.json \
            --output-dir .ci-bundle \
            --enable-dynamic-market

      - name: Validate generated bundle files
        shell: bash
        run: |
          test -f .ci-bundle/macOS/安装.command
          test -f .ci-bundle/macOS/回滚.command
          test -f .ci-bundle/Windows/安装.bat
          test -f .ci-bundle/Windows/回滚.bat

  windows-wrapper:
    name: Windows Wrapper Smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Windows installer wrapper with missing target
        shell: cmd
        run: |
          Windows\安装.bat "%RUNNER_TEMP%\missing-cursor-app"
          if not "%ERRORLEVEL%"=="2" exit /b 1
