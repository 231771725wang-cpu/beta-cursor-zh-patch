name: Cross Platform Smoke

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate CLI syntax
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path("cursor_zh/cli.py").read_text(encoding="utf-8")
          compile(source, "cursor_zh/cli.py", "exec")
          print("cli.py syntax ok")
          PY

      - name: Create smoke manifest
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = {
              "manifest_version": 1,
              "cursor": {
                  "app_path": "/tmp/cursor-app",
                  "version": "3.0.12",
                  "commit": "test-commit",
                  "lang_pack_path": "/Users/demo/.cursor/extensions/ms-ceintl.vscode-language-pack-zh-hans-1.105.0-universal",
              },
              "files": [
                  {
                      "path": "/tmp/cursor-app/out/nls.messages.json",
                      "target_rel_path": "out/nls.messages.json",
                      "source_sha256": "dummy",
                      "replacements": [{"from": "\"Hello\"", "to": "\"你好\"", "expected_hits": 1}],
                  }
              ],
          }
          Path(".ci-manifest.json").write_text(json.dumps(manifest), encoding="utf-8")
          PY

      - name: Export local bundle
        shell: bash
        run: |
          export PYTHONPATH=.
          rm -rf .ci-bundle
          python -m cursor_zh export-local-bundle \
            --manifest .ci-manifest.json \
            --output-dir .ci-bundle \
            --enable-dynamic-market

      - name: Export experimental overlay
        shell: bash
        run: |
          export PYTHONPATH=.
          rm -rf .ci-store-overlay .ci-cursor-app
          mkdir -p .ci-cursor-app/extensions/cursor-private-sample
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path(".ci-cursor-app")
          (root / "package.json").write_text(json.dumps({"version": "3.0.12"}), encoding="utf-8")
          (root / "product.json").write_text(json.dumps({"commit": "test-commit"}), encoding="utf-8")
          ext = root / "extensions" / "cursor-private-sample"
          (ext / "package.json").write_text(
              json.dumps({"publisher": "anysphere", "name": "cursor-private-sample"}),
              encoding="utf-8",
          )
          (ext / "package.nls.json").write_text(
              json.dumps({"test.title": "Open Workspace"}),
              encoding="utf-8",
          )
          PY
          python -m cursor_zh export-store-extension \
            --cursor-app .ci-cursor-app \
            --output-dir .ci-store-overlay

      - name: Validate generated bundle files
        shell: bash
        run: |
          test -f .ci-bundle/macOS/安装.command
          test -f .ci-bundle/macOS/回滚.command
          test -f .ci-bundle/Windows/安装.bat
          test -f .ci-bundle/Windows/回滚.bat
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path(".ci-bundle/payload/patch_manifest.json").read_text(encoding="utf-8"))
          assert manifest["cursor"]["app_path"] is None
          assert manifest["cursor"]["lang_pack_path"] is None
          PY

      - name: Validate overlay metadata and copy text
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          package = json.loads(Path(".ci-store-overlay/package.json").read_text(encoding="utf-8"))
          readme = Path(".ci-store-overlay/README.md").read_text(encoding="utf-8")
          changelog = Path(".ci-store-overlay/CHANGELOG.md").read_text(encoding="utf-8")
          root_readme = Path("README.md").read_text(encoding="utf-8")

          assert package["name"] == "beta-cursor-hanhua"
          assert package["displayName"] == "Beta Cursor 私有扩展汉化覆盖层（实验）"
          assert "extensionDependencies" not in package
          assert "依赖官方简体中文语言包" not in readme
          assert "实验性的 Cursor 私有扩展汉化覆盖层" in readme
          assert "不依赖官方简体中文语言包作为安装前提" in changelog
          assert "Source code zip" in root_readme
          assert "GitHub Releases" in root_readme
          PY

      - name: macOS bundle install and rollback smoke
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          export PYTHONPATH=.
          rm -rf .ci-target-app
          mkdir -p .ci-target-app/out
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path(".ci-target-app")
          (root / "package.json").write_text(json.dumps({"version": "3.0.12"}), encoding="utf-8")
          (root / "product.json").write_text(json.dumps({"commit": "test-commit", "checksums": {}}), encoding="utf-8")
          (root / "out" / "nls.messages.json").write_text('"Hello"\n', encoding="utf-8")
          PY
          bash .ci-bundle/macOS/安装.command "$PWD/.ci-target-app"
          python - <<'PY'
          from pathlib import Path
          text = Path(".ci-target-app/out/nls.messages.json").read_text(encoding="utf-8")
          assert '"你好"' in text
          PY
          bash .ci-bundle/macOS/回滚.command
          python - <<'PY'
          from pathlib import Path
          text = Path(".ci-target-app/out/nls.messages.json").read_text(encoding="utf-8")
          assert '"Hello"' in text
          PY

      - name: Windows bundle install and rollback smoke
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $env:PYTHONPATH = "."
          Remove-Item -Recurse -Force .ci-target-app -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path .ci-target-app/out | Out-Null
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path(".ci-target-app")
          (root / "package.json").write_text(json.dumps({"version": "3.0.12"}), encoding="utf-8")
          (root / "product.json").write_text(json.dumps({"commit": "test-commit", "checksums": {}}), encoding="utf-8")
          (root / "out" / "nls.messages.json").write_text('"Hello"\n', encoding="utf-8")
          PY
          cmd /c ".ci-bundle\\Windows\\安装.bat \"%CD%\\.ci-target-app\""
          python - <<'PY'
          from pathlib import Path
          text = Path(".ci-target-app/out/nls.messages.json").read_text(encoding="utf-8")
          assert '"你好"' in text
          PY
          cmd /c ".ci-bundle\\Windows\\回滚.bat"
          python - <<'PY'
          from pathlib import Path
          text = Path(".ci-target-app/out/nls.messages.json").read_text(encoding="utf-8")
          assert '"Hello"' in text
          PY
